<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws://127.0.0.1:* http://127.0.0.1:* ws://localhost:* http://localhost:*"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Work Companion</title>
    <link rel="stylesheet" href="./codex-surface.css" />
  </head>
  <body>
    <main class="codex-shell">
      <header class="topbar">
        <div class="title-block">
          <p class="eyebrow">Codex plane</p>
          <h1 id="projectName">Codex session</h1>
          <p id="repoPath" class="subline mono">—</p>
        </div>
        <div class="meta">
          <span id="connectionBadge" class="badge">offline</span>
          <span id="accountBadge" class="badge subtle">account unknown</span>
          <span id="modelBadge" class="badge subtle">default model</span>
        </div>
      </header>

      <section class="transcript" id="transcript" aria-label="Codex transcript"></section>

      <form id="composerForm" class="composer-shell">
        <textarea
          id="composerInput"
          rows="4"
          placeholder="Ask Codex to inspect, change, or explain the project…"
        ></textarea>
        <button id="sendButton" type="submit">Send</button>
      </form>
    </main>
    <script src="./codex-surface.js"></script>
  </body>
</html>
